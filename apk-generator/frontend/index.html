<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK 生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
h1 {
  font-size: 24px;
  color: #333;
  text-align: center;
  margin-bottom: 6px;
}
.subtitle {
  text-align: center;
  color: #888;
  font-size: 14px;
  margin-bottom: 30px;
}
.field {
  margin-bottom: 20px;
}
.field label {
  display: block;
  font-size: 13px;
  color: #555;
  margin-bottom: 6px;
  font-weight: 500;
}
.field input {
  width: 100%;
  height: 44px;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  padding: 0 14px;
  font-size: 15px;
  transition: border-color 0.2s;
  outline: none;
}
.field input:focus { border-color: #667eea; }
.field input::placeholder { color: #bbb; }
.btn {
  width: 100%;
  height: 48px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.status {
  text-align: center;
  margin-top: 16px;
  font-size: 14px;
  color: #888;
  min-height: 20px;
}
.status.success { color: #27ae60; }
.status.error { color: #e74c3c; }
.download-link {
  display: none;
  text-align: center;
  margin-top: 12px;
}
.download-link a {
  color: #667eea;
  font-weight: 600;
  text-decoration: none;
  font-size: 15px;
}
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid #667eea;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>APK 生成器</h1>
  <p class="subtitle">输入网址，一键生成 Android 安装包</p>

  <div class="field">
    <label>网页地址 *</label>
    <input type="url" id="url" placeholder="https://www.example.com" required>
  </div>
  <div class="field">
    <label>应用名称 *</label>
    <input type="text" id="appName" placeholder="我的应用" required maxlength="30">
  </div>
  <div class="field">
    <label>图标链接（可选）</label>
    <input type="url" id="iconUrl" placeholder="https://example.com/icon.png">
  </div>

  <button class="btn" id="generateBtn" onclick="generateApk()">生成 APK</button>
  <div class="status" id="status"></div>
  <div class="download-link" id="downloadLink">
    <a id="downloadA" href="#" download>下载 APK</a>
  </div>
</div>

<script>
async function generateApk() {
  const url = document.getElementById('url').value.trim();
  const appName = document.getElementById('appName').value.trim();
  const iconUrl = document.getElementById('iconUrl').value.trim();

  if (!url) { showStatus('请输入网页地址', 'error'); return; }
  if (!appName) { showStatus('请输入应用名称', 'error'); return; }

  const btn = document.getElementById('generateBtn');
  const statusEl = document.getElementById('status');
  const linkEl = document.getElementById('downloadLink');

  btn.disabled = true;
  btn.textContent = '生成中...';
  statusEl.innerHTML = '<span class="spinner"></span>正在编译 APK，大约需要 2-3 分钟...';
  statusEl.className = 'status';
  linkEl.style.display = 'none';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, appName, iconUrl })
    });
    const data = await res.json();
    if (data.success) {
      statusEl.innerHTML = 'APK 生成成功！';
      statusEl.className = 'status success';
      document.getElementById('downloadA').href = data.downloadUrl;
      linkEl.style.display = 'block';
    } else {
      showStatus(data.message || '生成失败', 'error');
    }
  } catch (err) {
    showStatus('网络错误，请重试', 'error');
  }

  btn.disabled = false;
  btn.textContent = '生成 APK';
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status ' + type;
}
</script>
</body>
</html>
